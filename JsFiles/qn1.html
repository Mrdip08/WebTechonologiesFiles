<!DOCTYPE html>
<html lang="en">
<head>
    <title>JavaScript Types</title>
    <!-- Internal JavaScript -->
    <script>
        function internalAlert() {
            alert("This is Internal JavaScript");
        }
    </script>
    <!-- External JavaScript -->
    <script src="/qn1.js"></script>
</head>
<body>
    <h2>JavaScript Implementation Types</h2>
    <button onclick="internalAlert()">Internal JS</button>
    <button onclick="externalAlert()">External JS</button>
    <!-- Inline JavaScript -->
    <button onclick="alert('This is Inline JavaScript')">Inline JS</button>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #box { width: 100px; height: 100px; background: red; position: absolute; left: 10px; }
    </style>
</head>
<body>
    <button id="animateBtn">Animate Box</button>
    <div id="box"></div>

    <script>
        $(document).ready(function() {
            $('#animateBtn').click(function() {
                $('#box').animate({
                    left: '250px',
                    width: '200px'
                }, 1000);
            });
        });
    </script>
</body>
</html>

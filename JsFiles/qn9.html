<!DOCTYPE html>
<html>
<head>
    <style>
        .container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .box { padding: 10px; min-width: 30px; text-align: center; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <input type="number" id="limit" placeholder="Enter N">
    <button onclick="generateNumbers()">Generate</button>
    <div id="container" class="container"></div>

    <script>
        function isPrime(num) {
            if (num < 2) return false;
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) return false;
            }
            return true;
        }

        function generateNumbers() {
            const container = document.getElementById('container');
            container.innerHTML = "";
            const limit = parseInt(document.getElementById('limit').value, 10);
            
            for (let i = 1; i <= limit; i++) {
                const div = document.createElement('div');
                div.className = 'box';
                div.textContent = i;
                
                if (isPrime(i)) {
                    div.style.backgroundColor = 'red'; // Prime
                } else if (i % 2 === 0) {
                    div.style.backgroundColor = 'green'; // Even
                } else {
                    div.style.backgroundColor = 'blue'; // Odd
                }
                container.appendChild(div);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<body>
    <script>
        let a = parseInt(prompt("Enter first integer:"), 10);
        let b = parseInt(prompt("Enter second integer:"), 10);
        if (a === b) {
            document.write("Both numbers are equal.");
        } else {
            document.write(`Larger: ${Math.max(a, b)} <br> Smaller: ${Math.min(a, b)}`);
        }
    </script>
</body>
</html>

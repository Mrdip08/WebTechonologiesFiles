<!DOCTYPE html>
<html>
<body>
    <script>
        let a = parseInt(prompt("Enter first:"), 10);
        let b = parseInt(prompt("Enter second:"), 10);
        let c = parseInt(prompt("Enter third:"), 10);
        document.write(`Larger: ${Math.max(a, b, c)} <br> Smaller: ${Math.min(a, b, c)}`);
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<body>
    <input type="text" id="urlInput" placeholder="https://google.com">
    <button onclick="openTab()">Open Website</button>

    <script>
        function openTab() {
            let url = document.getElementById('urlInput').value.trim();
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }
            window.open(url, '_blank');
        }
    </script>
</body>
</html>

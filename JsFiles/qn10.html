<!DOCTYPE html>
<html>
<body>
    <div style="text-align: center; margin-top: 20px;">
        <h1 id="counter">0</h1>
        <button onclick="changeCounter(-1)">Decrease</button>
        <button onclick="changeCounter(0)">Reset</button>
        <button onclick="changeCounter(1)">Increase</button>
    </div>

    <script>
        let count = 0;
        const counterVal = document.getElementById('counter');
        function changeCounter(val) {
            count = val === 0 ? 0 : count + val;
            counterVal.textContent = count;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <style>
        .container { display: flex; flex-wrap: wrap; gap: 5px; }
        .box { width: 40px; height: 40px; display: flex; align-items: center; 
               justify-content: center; font-weight: bold; color: black; }
    </style>
</head>
<body>
    <div id="number-container" class="container"></div>

    <script>
        function isPrime(num) {
            if (num < 2) return false;
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) return false;
            }
            return true;
        }

        const container = document.getElementById('number-container');
        for (let i = 0; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'box';
            div.textContent = i;

            if (isPrime(i)) {
                div.style.backgroundColor = 'red'; // Prime takes priority
            } else if (i % 2 === 0) {
                div.style.backgroundColor = 'green'; // Even
            } else {
                div.style.backgroundColor = 'yellow'; // Odd
            }
            container.appendChild(div);
        }
    </script>
</body>
</html>

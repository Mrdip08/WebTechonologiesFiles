<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image Hover Overlay</title>
    <style>
        .card-container {
            position: relative;
            width: 300px;
            height: 400px;
            overflow: hidden;
            border-radius: 8px;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            overflow: hidden;
            width: 100%;
            height: 0;
            transition: .5s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .card-container:hover .overlay {
            height: 100%;
        }
        .btn {
            background-color: red;
            color: white;
            padding: 5px 15px;
            text-decoration: none;
            margin-top: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <img src="https://via.placeholder.com/300x400" alt="Landscape" class="card-img">
        <div class="overlay">
            <h3>Card Title</h3>
            <p>This is a sample description shown when hovering over the card.</p>
            <a href="#" class="btn">Read More</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registration / Login Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            padding: 50px 0;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            width: 800px;
            gap: 40px;
        }
        .form-box { flex: 1; min-width: 300px; }
        h2 { border-bottom: 2px solid #00bcff; padding-bottom: 5px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            color: white;
            box-sizing: border-box;
        }
        .btn {
            background-color: #d35400;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { background-color: #e67e22; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Registration Form -->
        <div class="form-box">
            <h2>Register Form</h2>
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Confirm Password" required>
                </div>
                <div class="input-group">
                    <label><input type="radio" name="gender"> Female</label>
                    <label><input type="radio" name="gender"> Male</label>
                </div>
                <div class="input-group">
                    <label><input type="checkbox"> I have read and accept terms of use.</label>
                </div>
                <button type="submit" class="btn">SUBMIT</button>
            </form>
        </div>

        <!-- Login Form -->
        <div class="form-box">
            <h2>Login Form</h2>
            <form>
                <div class="input-group">
                    <input type="email" placeholder="Enter Your Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <label><input type="checkbox"> Remember me</label>
                </div>
                <button type="submit" class="btn" style="background-color: #f39c12;">LOGIN</button>
            </form>
        </div>
    </div>
</body>
</html>

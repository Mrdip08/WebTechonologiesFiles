<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lok Sewa Aayog Registration Form</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f9fa; margin: 0; padding: 20px; }
        .form-container {
            background-color: white;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-top: 5px solid #d32f2f;
        }
        h2 { text-align: center; color: #d32f2f; }
        .input-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .submit-btn {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        .submit-btn:hover { background-color: #b71c1c; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>PSC Portal Registration Form</h2>
        <form>
            <div class="input-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" required>
                </div>
            </div>
            <div class="input-row">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" required>
                </div>
            </div>
            <div class="input-row">
                <div class="form-group">
                    <label>Gender</label>
                    <select>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" required>
                </div>
            </div>
            <button type="submit" class="submit-btn">Register Now</button>
        </form>
    </div>
</body>
</html>

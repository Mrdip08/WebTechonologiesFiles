<!DOCTYPE html>
<html lang="en">
<head>
    <title>Iframe and Image Tag</title>
</head>
<body>
    <h2>Image Tag Example</h2>
    <!-- Replace URL with your actual image path -->
    <img src="https://via.placeholder.com/300" alt="Placeholder Image" width="300" height="200">

    <h2>Iframe Tag Example</h2>
    <!-- Embedded Wikipedia Page -->
    <iframe src="https://example.com" title="Embedded Webpage" width="100%" height="300"></iframe>
</body>
</html>

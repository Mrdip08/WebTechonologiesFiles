<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grade Sheet</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; }
        .total-row { font-weight: bold; background-color: #eaeded; }
    </style>
</head>
<body>
    <h2 align="center">2nd Semester Academic Grade Sheet</h2>
    <table>
        <thead>
            <tr>
                <th>Subject Code</th>
                <th>Subject Title</th>
                <th>Credit Hours</th>
                <th>Grade Obtained</th>
                <th>Grade Point</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>IT 237</td>
                <td>Web Technology I</td>
                <td>3</td>
                <td>A</td>
                <td>4.0</td>
            </tr>
            <tr>
                <td>IT 238</td>
                <td>Database Management System</td>
                <td>3</td>
                <td>A-</td>
                <td>3.7</td>
            </tr>
            <tr class="total-row">
                <td colspan="4">SGPA</td>
                <td>3.85</td>
            </tr>
        </tbody>
    </table>
</body>
</html>

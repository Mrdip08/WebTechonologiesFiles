<!DOCTYPE html>
<html lang="en">
<head>
    <title>Responsive Menu</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        .navbar {
            background-color: #0b3c5d;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
        .logo { color: white; font-weight: bold; font-size: 20px; }
        .menu { display: flex; list-style: none; margin: 0; padding: 0; }
        .menu li a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
        }
        .menu li a:hover { background-color: #328cc1; }
        
        /* Mobile Menu Button - Hidden on Desktop */
        .menu-toggle { display: none; color: white; font-size: 24px; cursor: pointer; }

        @media (max-width: 768px) {
            .menu { display: none; width: 100%; flex-direction: column; background-color: #0b3c5d; }
            .menu li { text-align: center; }
            .menu-toggle { display: block; }
            /* Simple hover trick to show items on mobile if active class is toggled */
            .navbar:hover .menu { display: flex; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Mystery Code</div>
        <span class="menu-toggle">&#9776;</span>
        <ul class="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Service</a></li>
            <li><a href="#">Portfolio</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
    </nav>
</body>
</html>

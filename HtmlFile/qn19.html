<!DOCTYPE html>
<html lang="en">
<head>
    <title>Team Card Layout</title>
    <style>
        .team-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .card {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            width: 200px;
            background: white;
        }
        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }
        .name { font-weight: bold; margin: 10px 0 5px; }
        .role { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h2 align="center">Our Team Members</h2>
    <div class="team-container">
        <div class="card">
            <img src="https://via.placeholder.com/100" alt="Noman">
            <div class="name">Noman</div>
            <div class="role">Programmer</div>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/100" alt="Aasim">
            <div class="name">Aasim</div>
            <div class="role">CEO</div>
        </div>
    </div>
</body>
</html>
